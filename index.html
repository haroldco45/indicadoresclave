<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicadores Clave | ASETEC HM</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f1f5f9; }
        .input-field { 
            @apply w-full border-2 border-gray-100 rounded-xl p-4 text-lg focus:border-indigo-500 focus:bg-white outline-none transition-all bg-gray-50;
        }
        label { @apply block text-xs font-bold text-gray-500 uppercase mb-2 tracking-widest; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <div class="w-full max-w-lg bg-white rounded-[2.5rem] shadow-2xl overflow-hidden border border-gray-100 mt-6">
        
        <div class="p-8 text-center bg-white border-b border-gray-50">
            <div class="flex justify-center mb-4">
                <img src="./asetech.PNG" alt="Logo ASETEC HM" class="h-32 w-auto object-contain">
            </div>
            <h1 class="text-indigo-900 text-xl font-black uppercase tracking-tighter">Panel de Gestión</h1>
            <p class="text-gray-400 text-[10px] font-bold uppercase tracking-[0.2em] mt-1">Antioquia | Consumo Masivo</p>
        </div>

        <div class="p-8 space-y-6">
            <div class="grid grid-cols-1 gap-5">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Clientes Impactados</label>
                        <input type="number" id="cli_impactados" class="input-field" placeholder="0">
                    </div>
                    <div>
                        <label>Ventas Antes IVA</label>
                        <input type="number" id="ventas_netas" class="input-field" placeholder="$">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Clientes Nuevos</label>
                        <input type="number" id="cli_nuevos" class="input-field" placeholder="0">
                    </div>
                    <div>
                        <label>Ref. Pedidas</label>
                        <input type="number" id="ref_pedidas" class="input-field" placeholder="0">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Ref. No Despachadas</label>
                        <input type="number" id="ref_fallidas" class="input-field" placeholder="0">
                    </div>
                    <div>
                        <label>Días Mora Cartera</label>
                        <input type="number" id="mora_cartera" class="input-field" placeholder="0">
                    </div>
                </div>
            </div>

            <button onclick="analizarYEnviar()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-lg shadow-emerald-100 transform active:scale-95 transition-all flex items-center justify-center gap-3 text-xs tracking-widest uppercase">
                Enviar Análisis a WhatsApp
            </button>
        </div>

        <div class="bg-gray-50 p-6 text-center border-t border-gray-100">
            <p class="text-gray-700 text-[12px] font-black uppercase tracking-widest">
                App desarrollada por <span class="text-indigo-600">VIBRAS POSITIVAS</span>
            </p>
            <p class="text-gray-500 text-[10px] font-bold mt-1">DERECHOS DE AUTOR © 2026</p>
            <p class="text-gray-600 text-[10px] font-bold mt-1 tracking-tighter">CONTACTO: 3117700431</p>
        </div>
    </div>

    <script>
        function analizarYEnviar() {
            const tel = "573117700431";
            
            const d = {
                impactados: parseInt(document.getElementById('cli_impactados').value) || 0,
                ventas: parseInt(document.getElementById('ventas_netas').value) || 0,
                nuevos: parseInt(document.getElementById('cli_nuevos').value) || 0,
                pedidas: parseInt(document.getElementById('ref_pedidas').value) || 0,
                fallidas: parseInt(document.getElementById('ref_fallidas').value) || 0,
                mora: parseInt(document.getElementById('mora_cartera').value) || 0
            };

            const nivelServicio = d.pedidas > 0 ? ((1 - (d.fallidas / d.pedidas)) * 100).toFixed(1) : 0;
            
            let diagnostico = "";
            let recomendaciones = "";

            if (nivelServicio < 88) {
                diagnostico += "❌ NIVEL DE SERVICIO: " + nivelServicio + "% (Bajo el estándar del 90%).%0A";
                recomendaciones += "- Urgente: Revisar quiebres de stock y logística.%0A";
            } else {
                diagnostico += "✅ NIVEL DE SERVICIO: " + nivelServicio + "% (Eficiente).%0A";
            }

            if (d.mora > 30) {
                diagnostico += "⚠️ MORA: " + d.mora + " días (Promedio sector Antioquia es 28).%0A";
                recomendaciones += "- Iniciar gestión de cobro inmediata.%0A";
            } else {
                diagnostico += "✅ CARTERA: " + d.mora + " días (Sana).%0A";
            }

            // Mensaje de WhatsApp con créditos incluidos
            const mensaje = `*REPORTE ESTRATÉGICO - ASETEC HM*%0A%0A` +
                          `📊 *GESTIÓN COMERCIAL:*%0A` +
                          `- Ventas: $${d.ventas.toLocaleString()}%0A` +
                          `- Impacto: ${d.impactados} clientes%0A%0A` +
                          `🔍 *DIAGNÓSTICO:*%0A${diagnostico}%0A` +
                          `💡 *RECOMENDACIONES:*%0A${recomendaciones || "- Continuar con el modelo de gestión actual.%0A"}%0A` +
                          `--------------------------%0A` +
                          `🚀 *App desarrollada por Vibras Positivas*%0A` +
                          `© Derechos de Autor (Contacto: 3117700431)`;

            window.open(`https://wa.me/${tel}?text=${mensaje}`, '_blank');
        }
    </script>
</body>
</html>
