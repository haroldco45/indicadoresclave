<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Indicadores Clave | Diagnóstico</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #f8fafc; }
        .input-field { 
            @apply w-full border-2 border-gray-100 rounded-xl p-4 text-lg focus:border-indigo-500 focus:bg-white outline-none transition-all bg-gray-50;
        }
        label { @apply block text-xs font-bold text-gray-400 uppercase mb-2 tracking-widest; }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-lg bg-white rounded-[2.5rem] shadow-2xl shadow-indigo-100 overflow-hidden border border-gray-100">
        <div class="bg-indigo-600 p-8 text-center">
            <h1 class="text-white text-xl font-black tracking-tighter uppercase">Panel de Control</h1>
            <p class="text-indigo-200 text-xs font-medium uppercase mt-1 tracking-widest">Antioquia | Consumo Masivo</p>
        </div>

        <div class="p-8 md:p-10 space-y-6">
            <div class="grid grid-cols-1 gap-6">
                
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Clientes Impactados</label>
                        <input type="number" id="cli_impactados" class="input-field" placeholder="0">
                    </div>
                    <div>
                        <label>Ventas (Antes IVA)</label>
                        <input type="number" id="ventas_netas" class="input-field" placeholder="$">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Clientes Nuevos</label>
                        <input type="number" id="cli_nuevos" class="input-field" placeholder="0">
                    </div>
                    <div>
                        <label>Ref. Pedidas</label>
                        <input type="number" id="ref_pedidas" class="input-field" placeholder="0">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label>Ref. No Despachadas</label>
                        <input type="number" id="ref_fallidas" class="input-field" placeholder="0">
                    </div>
                    <div>
                        <label>Días Mora Cartera</label>
                        <input type="number" id="mora_cartera" class="input-field" placeholder="0">
                    </div>
                </div>

            </div>

            <button onclick="analizarYEnviar()" class="w-full bg-emerald-500 hover:bg-emerald-600 text-white font-black py-5 rounded-2xl shadow-lg shadow-emerald-100 transform active:scale-[0.98] transition-all flex items-center justify-center gap-3 text-sm tracking-widest">
                ENVIAR ANÁLISIS ESTRATÉGICO
            </button>
        </div>
    </div>

    <script>
        function analizarYEnviar() {
            const tel = "573117700431";
            
            const d = {
                impactados: parseInt(document.getElementById('cli_impactados').value) || 0,
                ventas: parseInt(document.getElementById('ventas_netas').value) || 0,
                nuevos: parseInt(document.getElementById('cli_nuevos').value) || 0,
                pedidas: parseInt(document.getElementById('ref_pedidas').value) || 0,
                fallidas: parseInt(document.getElementById('ref_fallidas').value) || 0,
                mora: parseInt(document.getElementById('mora_cartera').value) || 0
            };

            const nivelServicio = d.pedidas > 0 ? ((1 - (d.fallidas / d.pedidas)) * 100).toFixed(1) : 0;
            
            let diagnostico = "";
            let recomendaciones = "";

            // Lógica de Análisis (Comparativa Sector Antioquia)
            if (nivelServicio < 88) {
                diagnostico += "❌ NIVEL DE SERVICIO: " + nivelServicio + "% (Crítico vs 90% del sector).%0A";
                recomendaciones += "- Revisar logística y quiebres de inventario.%0A";
            } else {
                diagnostico += "✅ NIVEL DE SERVICIO: " + nivelServicio + "% (Óptimo).%0A";
            }

            if (d.mora > 30) {
                diagnostico += "⚠️ MORA: " + d.mora + " días (Excede el promedio de 28-30 días).%0A";
                recomendaciones += "- Ajustar política de crédito y cobranza.%0A";
            } else {
                diagnostico += "✅ CARTERA: " + d.mora + " días (Sana).%0A";
            }

            const mensaje = `*REPORTE ESTRATÉGICO ANTIOQUIA*%0A%0A` +
                          `📊 *CIFRAS CLAVE:*%0A` +
                          `- Ventas: $${d.ventas.toLocaleString()}%0A` +
                          `- Clientes Impactados: ${d.impactados}%0A` +
                          `- Clientes Nuevos: ${d.nuevos}%0A%0A` +
                          `🔍 *DIAGNÓSTICO:*%0A${diagnostico}%0A` +
                          `💡 *RECOMENDACIONES:*%0A${recomendaciones || "- Mantener ritmo actual.%0A"}%0A` +
                          `_Enviado desde Panel Indicadores Clave_`;

            window.open(`https://wa.me/${tel}?text=${mensaje}`, '_blank');
        }
    </script>
</body>
</html>
